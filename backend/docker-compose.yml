version: '3.8'

services:
  backend:
    build: .
    container_name: smart-leads-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - JWT_SECRET=your_super_secret_key_here
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: smart-leads-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: